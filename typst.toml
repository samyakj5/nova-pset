# for a description of available keys, see https://github.com/typst/packages/?tab=readme-ov-file#package-format

[package]
name = "nova-pset"
version = "0.1.0"
entrypoint = "src/lib.typ"
authors = ["Samyak Jain <samyakj5@illinois.edu>"]
license = "Unlicense"
description = "A modular problem set template for STEM coursework."
repository = "https://github.com/samyakj5/nova-pset"
keywords = ["pset", "homework", "stem"]
categories = ["report"]
# compiler = ""
exclude = [
  ".github",
  "docs",
  "scripts",
  "tests",
  ".typstignore",
  "Justfile",
  "thumbnail-dark.svg",
  "thumbnail-light.svg",
  "thumbnail.png",
  "example.pdf",
]

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"
